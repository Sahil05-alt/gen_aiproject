services:
  - type: web
    name: docmind-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: EMBEDDING_MODEL
        value: sentence-transformers/all-MiniLM-L6-v2
      - key: CHUNK_SIZE
        value: "512"
      - key: CHUNK_OVERLAP
        value: "50"
      - key: TOP_K
        value: "5"
      - key: VECTOR_STORE_PATH
        value: ./data/vectorstore
      - key: UPLOADS_PATH
        value: ./data/uploads
      - key: METADATA_PATH
        value: ./data/metadata
      - key: CORS_ORIGINS
        sync: false
